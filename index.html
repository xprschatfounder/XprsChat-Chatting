<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xprschat chatting</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --accent: #ff0000; --panel: #111; --border: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .auth-box { background: var(--panel); padding: 40px; border: 1px solid var(--accent); border-radius: 8px; width: 320px; text-align: center; box-shadow: 0 0 20px rgba(255,0,0,0.3); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 4px; box-sizing: border-box; outline: none; }
        .primary-btn { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        
        /* Main App */
        #app { display: none; width: 100%; height: 100%; flex-direction: column; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Message Styling */
        .msg { border-left: 3px solid var(--accent); padding: 8px 12px; background: rgba(255,255,255,0.03); border-radius: 0 4px 4px 0; }
        .msg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .u { color: var(--accent); font-weight: bold; font-size: 13px; }
        .ts { color: #666; font-size: 10px; font-family: monospace; }
        .txt { font-size: 15px; line-height: 1.4; color: #eee; }

        .input-area { padding: 20px; border-top: 1px solid var(--border); background: #050505; }
        #brand { position: absolute; top: 15px; right: 20px; color: var(--accent); font-weight: 900; cursor: pointer; user-select: none; z-index: 10; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h1 style="color:var(--accent); margin-top:0;">xprschat</h1>
            <input type="text" id="username" placeholder="Nickname">
            <input type="password" id="access-code" placeholder="Password or Access Code">
            <label style="font-size: 11px; color: #666; display: block; margin-bottom: 15px; cursor: pointer;">
                <input type="checkbox" id="remember-me" checked> Remember Me
            </label>
            <button class="primary-btn" onclick="handleLogin()">Enter Chat</button>
        </div>
    </div>

    <div id="app">
        <div id="brand" onclick="adminClick()">xprschat chatting</div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') send()">
        </div>
    </div>

    <script>
        const SB_URL = "https://nallmqpqruylmghdengz.supabase.co"; 
        const SB_KEY = "sb_publishable_7jOonmkbG-mUoj4rubIzzQ_PgAdzt95";
        const MASTER_PASS = "XP2026"; 
        
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let clickCount = 0;

        window.onload = () => {
            if (localStorage.getItem('xprs_verified') === 'true') {
                showApp(localStorage.getItem('xprs_nick'));
            }
        };

        async function adminClick() {
            clickCount++;
            if (clickCount >= 5) {
                const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
                let newCode = "";
                for (let i = 0; i < 8; i++) newCode += chars.charAt(Math.floor(Math.random() * chars.length));
                const { error } = await supabaseClient.from('access_codes').insert([{ code: newCode }]);
                if (!error) alert("NEW UNIQUE CODE: " + newCode);
                clickCount = 0;
            }
        }

        async function handleLogin() {
            const nick = document.getElementById('username').value.trim();
            const inputCode = document.getElementById('access-code').value.trim();
            const remember = document.getElementById('remember-me').checked;

            if (!nick || !inputCode) return alert("Fill in all fields");

            let isAuthorized = (inputCode === MASTER_PASS);
            if (!isAuthorized) {
                const { data } = await supabaseClient.from('access_codes').select('code').eq('code', inputCode).single();
                if (data) isAuthorized = true;
            }

            if (!isAuthorized) return alert("Invalid Access Code!");

            const { error } = await supabaseClient.auth.signInAnonymously();
            if (error) return alert("Enable Anonymous Auth in Supabase!");

            if (remember) {
                localStorage.setItem('xprs_nick', nick);
                localStorage.setItem('xprs_verified', 'true');
            }
            showApp(nick);
        }

        function showApp(nick) {
            window.myNick = nick;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            startChat();
        }

        async function startChat() {
            const { data } = await supabaseClient.from('messages').select('*').order('created_at', {ascending: true}).limit(50);
            data?.forEach(render);
            supabaseClient.channel('chat').on('postgres_changes', {event:'INSERT', schema:'public', table:'messages'}, p => render(p.new)).subscribe();
        }

        function render(m) {
            const box = document.getElementById('chat-box');
            const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const d = document.createElement('div');
            d.className = 'msg';
            d.innerHTML = `
                <div class="msg-header">
                    <span class="u">${m.username}</span>
                    <span class="ts">${time}</span>
                </div>
                <div class="txt">${m.message}</div>
            `;
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        }

        async function send() {
            const i = document.getElementById('msg-input');
            const val = i.value.trim();
            if(!val) return;
            i.value = '';
            await supabaseClient.from('messages').insert([{ username: window.myNick, message: val }]);
        }
    </script>
</body>
</html>
